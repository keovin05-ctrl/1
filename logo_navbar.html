<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Khmer:wght@400;700&display=swap" rel="stylesheet">
    <!-- Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>





<style >
/* GENERAL */
body{
background:#f4f4f4;
font-family:Arial,sans-serif;
margin:0;
}
/* LOGO ANIMATION */
.logo-animate{
animation:rotateLogo 5s linear infinite;
max-width:120px;
height:auto;
}
@keyframes rotateLogo{
0%{transform:rotate(0)}
50%{transform:rotate(20deg)}
100%{transform:rotate(0)}
}
/* NAVBAR */
.navbar-brand{
font-weight:bold;
}
.navbar-nav .nav-link{
margin-right:1rem;
}





/*Scrolling text BANNER*/
.scrolling-wrapper{
overflow:hidden;
}
.scrolling-text{
display:block;
white-space:nowrap;
font-size:clamp(12px,2vw,18px);
animation:scroll-left 17s linear infinite;
}
@keyframes scroll-left{
0%{transform:translateX(100%)}
100%{transform:translateX(-100%)}
}
/*Scrolling text BANNER*/





/* RESPONSIVE */
/* tablet */
@media(max-width:768px){
.logo-animate{
max-width:80px;
}
.navbar-brand span{
font-size:14px;
}
.navbar-nav .nav-link{
font-size:13px;
margin-right:8px;
}
#searchForm{
width:100%;
margin-top:8px;
}
#searchInput{
font-size:13px;
height:32px;
}}
/* mobile */
@media(max-width:576px){
.logo-animate{
max-width:65px;
}
.navbar-brand span{
font-size:18px;
}
.navbar-nav{
justify-content:center;
width:100%;
}
.navbar-nav .nav-link{
font-size:12px;
padding:3px 6px;
}
.service-btn{
font-size:12px;
padding:8px 14px;
}
}
/* RESPONSIVE */




</style>
















    
</head>
<body>
    


<!-- NAVBAR &LOGO -->
<nav class="navbar navbar-dark bg-primary">
<div class="container d-flex flex-wrap align-items-center">
<a class="navbar-brand d-flex align-items-center me-3">
<img src="Logo_company/Approval Logo.png" class="logo-animate me-2">
<span>Davin MEP Tools Store</span>
</a>
<!-- NAVBAR &LOGO -->





<!-- Scrolling text BANNER -->
<div class="container-fluid px-0">
  <div style="
    background-image:url('https://www.shutterstock.com/image-photo/electrician-tools-on-black-marble-600nw-2301247757.jpg');
    background-size:cover;
    background-position:center;
    background-repeat:no-repeat;
    padding:20px;
    overflow:hidden;
    text-align:center;">
    <div class="scrolling-wrapper">
      <span class="scrolling-text" style="
        display:inline-block;
        background:rgba(73, 155, 199, 0.8); /* red background */
        color:white;
        padding:5px 15px;
        border-radius:5px;
        font-size:clamp(15px,2vw,18px);
        margin:0 auto;">
        សូមស្វាគមន៏ មកកាន់ Davin MEP Tools Store អស់បារម្ភ ចំពោះការទិញខុសសម្ភារៈ ដោយជួបអ្នកជំនាញផ្នែក
      </span>
    </div>
  </div>
</div>
<!-- Scrolling text BANNER -->



</body>
</html>
